<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#6c63ff" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Haushaltsplan" />
  <title>Haushaltsplan</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/components.css" />
</head>
<body>

  <!-- Profile Login Screen -->
  <div id="login-screen" class="login-screen hidden">
    <div class="login-card">
      <h1 class="login-title">🏠 Haushaltsplan</h1>
      <p class="login-subtitle">Wer bist du?</p>
      <div id="profile-list" class="profile-list"></div>
    </div>
  </div>

  <!-- Main App -->
  <div id="app" class="app hidden">

    <!-- Header -->
    <header class="app-header">
      <div class="header-left">
        <button id="btn-settings" class="icon-btn" aria-label="Einstellungen">⚙️</button>
      </div>
      <h1 class="header-title">🏠 Haushaltsplan</h1>
      <div class="header-right">
        <button id="btn-switch-profile" class="avatar-btn" aria-label="Profil wechseln">
          <div id="current-avatar" class="avatar avatar-sm"></div>
        </button>
      </div>
    </header>

    <!-- Tab Content -->
    <main id="tab-content" class="tab-content">
      <div id="tab-tasks" class="tab-pane"></div>
      <div id="tab-mealplan" class="tab-pane hidden"></div>
      <div id="tab-shopping" class="tab-pane hidden"></div>
      <div id="tab-recipes" class="tab-pane hidden"></div>
      <div id="tab-balance" class="tab-pane hidden"></div>
    </main>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav">
      <button class="nav-btn active" data-tab="tasks">
        <span class="nav-icon">✅</span>
        <span class="nav-label">Aufgaben</span>
      </button>
      <button class="nav-btn" data-tab="mealplan">
        <span class="nav-icon">🍽️</span>
        <span class="nav-label">Kochplan</span>
      </button>
      <button class="nav-btn" data-tab="shopping">
        <span class="nav-icon">🛒</span>
        <span class="nav-label">Einkaufen</span>
      </button>
      <button class="nav-btn" data-tab="recipes">
        <span class="nav-icon">📖</span>
        <span class="nav-label">Rezepte</span>
      </button>
      <button class="nav-btn" data-tab="balance">
        <span class="nav-icon">⚖️</span>
        <span class="nav-label">Bilanz</span>
      </button>
    </nav>
  </div>

  <!-- Settings Modal -->
  <div id="modal-settings" class="modal-overlay hidden">
    <div class="modal">
      <div class="modal-header">
        <h2>Einstellungen</h2>
        <button class="modal-close" data-close="modal-settings">✕</button>
      </div>
      <div class="modal-body" id="settings-content"></div>
    </div>
  </div>

  <!-- Generic Modal -->
  <div id="modal-generic" class="modal-overlay hidden">
    <div class="modal">
      <div class="modal-header">
        <h2 id="modal-generic-title"></h2>
        <button class="modal-close" data-close="modal-generic">✕</button>
      </div>
      <div class="modal-body" id="modal-generic-body"></div>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast" class="toast hidden"></div>

  <!-- Supabase CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <!-- PDF.js CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <!-- Chart.js CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>

  <!-- App globals: must run synchronously before ES modules -->
  <script src="js/supabase-client.js"></script>
  <script src="js/push.js"></script>
  <script type="module" src="js/app.js"></script>
</body>
</html>
